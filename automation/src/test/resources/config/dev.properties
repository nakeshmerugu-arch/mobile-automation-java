# Dev environment overrides. URLs and non-secret config only.
# Credentials and device IDs via environment variables or CI secrets.
# Prerequisites: (1) Appium server running (e.g. appium). (2) Android device connected via USB with USB debugging, or an emulator (AVD) running. Check with: adb devices

# Appium session endpoint is mounted at POST /session for this server.
# (If your Appium is started with --base-path /wd/hub, set /wd/hub back here.)
appium.server.url=http://127.0.0.1:4723
#platformName=Android
platformName=Mac
# Appium 2.x requires automationName (UiAutomator2 for Android, XCUITest for iOS)
#automationName=UiAutomator2
# Mac2 driver works best with vendor-prefixed capability.
#automationName=Mac2
appium\:automationName=Mac2
# App path: use absolute path for macOS .app so Mac2 driver finds it (relative path was resolving under automation/).
#app=../apps/stockuniverse-idstock.apk
# Launch from repo path (bundle contains spaces; spaces are escaped for .properties)
# Note: Mac2 driver uses `appium:appPath` (not the generic `app` capability name).
#app=/Users/nakesh.merugu/Automation/mobile-automation-java/apps/desktop-app/Ajaib\ Desktop\ Web\ Trade.app
appium\:appPath=/Users/nakesh.merugu/Automation/mobile-automation-java/apps/desktop-app/Ajaib\ Desktop\ Web\ Trade.app
# Bundle id (used by Mac2 driver for app lifecycle capabilities like skipAppKill)
appium\:bundleId=com.ajaib
# Wait for the application to launch before continuing (helps ensure the app is actually visible).
# Mac2 capability expects vendor-prefixed key.
appium\:appWaitForLaunch=true
# Mac2: show xcodebuild/WebDriverAgentMac output so we can see why the host process exits (e.g. code signing)
appium\:showServerLogs=true
# Safer startup profile for flaky launch sessions:
# always terminate any stale app process at session end/start boundary.
# This avoids "Failed to launch ... application" when a previous instance is half-alive.
appium\:skipAppKill=false

# Keep the session alive long enough while the app initializes heavy webview content.
appium\:newCommandTimeout=180

# Mac2 internal WDA server port. Helps avoid collisions if a previous session didn't fully release.
appium\:systemPort=10102
