# macOS desktop — Appium Mac2 (LaunchDesktopAppTest). Select with: -Denv=mac
# Prerequisites: Appium 2 + mac2 driver, automation mode, Accessibility for Terminal/IDE.
# Paths are relative to JVM working directory (Maven Surefire uses the automation module → ../ = repo root).

appium.server.url=http://127.0.0.1:4723
platformName=Mac
appium\:automationName=Mac2
appium\:appPath=../apps/desktop-app/Ajaib\ Desktop\ Web\ Trade.app
appium\:bundleId=com.ajaib
appium\:appWaitForLaunch=true
appium\:showServerLogs=true
appium\:skipAppKill=false
appium\:newCommandTimeout=180
appium\:systemPort=10102
